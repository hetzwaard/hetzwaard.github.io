<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<title>BunnyHoppy! - bunnyhoppy.com</title>
	<style>
		:root {
			color-scheme: dark;
		}

		body {
			margin: 0;
			background: #0d1117;
			font-family: "Fira Sans", "Segoe UI", sans-serif;
			color: #e6edf3;
		}

		main {
			max-width: 1280px;
			margin: 0 auto;
			padding: 16px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.5rem;
		}

		p {
			margin: 0 0 12px;
			opacity: 0.9;
		}

		.panel {
			font-size: 0.9rem;
			margin-bottom: 12px;
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		.panel code {
			background: #161b22;
			padding: 2px 6px;
			border-radius: 6px;
		}

		#status {
			font-size: 0.9rem;
			color: #58a6ff;
			margin-bottom: 8px;
		}

		canvas {
			width: 100%;
			height: auto;
			display: block;
			border: 1px solid #30363d;
			border-radius: 10px;
			background: #000;
		}
	</style>
</head>
<body>
	<main>
		<h1>BunnyHoppy! (Cub3D) WebAssembly Build</h1>
		<p>Map: <code>/maps/default.cub</code> (fixed).</p>
		<div class="panel">
			<span>Move: <code>WASD</code></span>
			<span>Look: <code>Mouse and Arrow Keys</code></span>
			<span>Open doors: <code>E</code></span>
			<span>Jump: <code>Space</code></span>
			<span>Show Map: <code>M</code></span>
			<span>Run: <code>Shift</code></span>
			<span>Exit: <code>Esc</code></span>
		</div>
		<div id="status">Loading WebAssembly module...</div>
		<canvas id="gamecanvas" width="1280" height="720"></canvas>
	</main>

	<script src="coi-serviceworker.js"></script>
	<script>
		const statusNode = document.getElementById("status");
		const canvas = document.getElementById("gamecanvas");
		const mapArg = "/maps/default.cub";

		window.Module = {
			arguments: [mapArg],
			canvas: canvas,
			preRun: [() => {
				try {
					if (typeof FS !== "undefined")
						FS.chdir("/");
				} catch (error) {
					console.error("Failed to set CWD:", error);
				}
			}],
			print: (text) => {
				console.log(text);
			},
			printErr: (text) => {
				console.error(text);
				statusNode.textContent = String(text);
			},
			onAbort: (why) => {
				statusNode.textContent = "Runtime aborted: " + String(why);
			},
			onRuntimeInitialized: () => {
				statusNode.textContent = "Loaded. Click the canvas to capture input.";
			}
		};

		canvas.addEventListener("webglcontextlost", (event) => {
			event.preventDefault();
			statusNode.textContent = "WebGL context lost. Reload the page.";
		});
	</script>
	<script src="cub3d.js"></script>
</body>
</html>
